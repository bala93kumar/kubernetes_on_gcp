apiVersion  : apps/v1
kind       : ReplicaSet
metadata:
  name: my-helloworld-rs
spec:
  replicas: 3
  selector:
    matchLabels:
      app: my-helloworld
  template:
    metadata: 
      name: my-helloworld-pod
      labels:
        app: my-helloworld
    spec:
      containers:    
        - name: my-helloworld-container
          image: stacksimplify/kubenginx:2.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80