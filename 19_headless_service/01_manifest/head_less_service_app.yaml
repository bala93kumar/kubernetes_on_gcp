apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: my-app-container
          image: us-docker.pkg.dev/google-samples/containers/gke/hello-app:2.0
          ports:
            - containerPort: 8080

---

apiVersion: v1
kind: Service
metadata:
  name: my-app-headless-service
spec:
  clusterIP: None
  selector:
    app: my-app
  ports:
    - name: http
      port: 8080
      targetPort: 8080