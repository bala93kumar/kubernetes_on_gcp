apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: spark-pi-long
  namespace: data
spec:
  type: Scala
  mode: cluster
  image: gcr.io/spark-operator/spark:v3.5.1
  imagePullPolicy: IfNotPresent
  mainClass: org.apache.spark.examples.SparkPi
  mainApplicationFile: local:///opt/spark/examples/jars/spark-examples.jar
  arguments:
    - "20000000"   # makes it run long enough to observe
  sparkVersion: "3.5.1"

  driver:
    cores: 1
    memory: "1g"
    serviceAccount: default

  executor:
    cores: 1
    memory: "1g"
    instances: 2
