apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: spark-pi
  namespace: default
spec:
  type: Scala
  mode: cluster

  image: spark:3.5.1
  imagePullPolicy: IfNotPresent

  mainClass: org.apache.spark.examples.SparkPi
  mainApplicationFile: local:///opt/spark/examples/jars/spark-examples_2.12-3.5.1.jar
  arguments: ["100"]
  sparkVersion: "3.5.1"

  driver:
    cores: 1
    memory: "1g"
    serviceAccount: default      # this SA now has RBAC

  executor:
    cores: 1
    memory: "1g"
    instances: 1